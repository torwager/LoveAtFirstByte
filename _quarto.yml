project:
  type: website
  output-dir: _site
  resources:
    - assets/**
    - .nojekyll
  preview:
    port: 4848
    browser: false

website:
  title: "Love at First Byte"
  description: "AI in Academia — a hands-on workshop for pain-science researchers."
  site-url: "https://torwager.github.io/LoveAtFirstByte/"
  repo-url: "https://github.com/torwager/LoveAtFirstByte"
  favicon: assets/img/favicon.svg
  page-navigation: true
  back-to-top-navigation: true
  reader-mode: false
  navbar:
    logo: assets/img/favicon.svg
    title: "Love at First Byte"
    pinned: true
    collapse-below: lg
    left:
      - text: "The Workshop"
        href: intro/overview.qmd
      - text: "AI Toolkit"
        href: intro/tools.qmd
      - text: "Challenges"
        href: challenges/index.qmd
    right:
      - icon: github
        href: https://github.com/torwager/LoveAtFirstByte
        aria-label: GitHub
  sidebar:
    - id: main
      style: floating
      collapse-level: 2
      contents:
        - text: "🏠 Home"
          href: index.qmd
        - section: "Get Started"
          contents:
            - intro/overview.qmd
            - intro/tools.qmd
        - section: "Challenges"
          contents:
            - challenges/index.qmd
            - text: "— Core & Foundational —"
              href: challenges/index.qmd
            - challenges/picture-this.qmd
            - challenges/model-horserace.qmd
            - challenges/plain-language-gauntlet.qmd
            - challenges/hypothesis-roulette.qmd
            - challenges/the-rebuttal.qmd
            - challenges/irb-speed-round.qmd
            - challenges/experiment-generator.qmd
            - challenges/rapid-review.qmd
            - challenges/flash-debate.qmd
            - challenges/meet-the-speaker.qmd
            - challenges/policy-wonk.qmd
            - section: "Advanced (Claude Code / Codex / Gemini CLI)"
              contents:
                - challenges/advanced/reviewer-4.qmd
                - challenges/advanced/who-are-my-friends.qmd
                - challenges/advanced/junkyard-dog.qmd
  page-footer:
    border: true
    left: "Love at First Byte · NAPS · AI for Academia 2026"
    center: "Built with [Quarto](https://quarto.org)"
    right: "© 2026 Tor Wager"

format:
  html:
    theme:
      - cosmo
      - theme.scss
    css: assets/css/extras.css
    toc: true
    toc-depth: 3
    toc-title: "On this page"
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    anchor-sections: true
    link-external-newwindow: true
    link-external-icon: true
    grid:
      sidebar-width: 280px
      body-width: 900px
      margin-width: 240px
